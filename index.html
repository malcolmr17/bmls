<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BMLS"/>
<meta name="theme-color" content="#111827"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<title>BMLS</title>
<link rel="stylesheet" href="/fonts/fonts.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0B0F1A;font-family:'DM Sans',sans-serif;color:#E2E8F0;-webkit-tap-highlight-color:transparent;}
select option{background:#111827;}
button:focus{outline:2px solid #3B82F6;outline-offset:2px;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#1E293B;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0B0F1A;}
::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="/bundle.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
  })
}
</script>
</body>
</html>
